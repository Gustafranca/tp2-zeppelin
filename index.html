<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP2 - Concrete jungle</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB; /* Céu diurno */
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
        }
        h3 { margin-top: 0; }
        ul { padding-left: 20px; margin-bottom: 0; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <h3>Controles do Zeppelin</h3>
        <ul>
            <li><b>Setas:</b> Mover (X, Z)</li>
            <li><b>1 e 2:</b> Alternar Câmeras </li>
            <li><b>3:</b> Câmera livre (clique e arraste) </li>
            <li><b>C:</b> Alternar visão lateral </li>
            <li><b>L:</b> Ligar/Desligar Luz </li>
            
        </ul>
    </div>

    <script src="https://twgljs.org/dist/4.x/twgl-full.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
